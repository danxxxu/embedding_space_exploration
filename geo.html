<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Embedding Geo Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222;
      --text: #ddd; --dim: #666; --accent: #7aa2f7;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      height: 100dvh; height: 100vh; /* fallback */
      width: 100vw;
      overflow: hidden;
    }
    /* iOS safe area for notch / home indicator */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }

    /* ── mobile-first layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
    }
    @supports (height: 100dvh) {
      #app { height: 100dvh; }
    }

    /* ── top bar ── */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
    }
    #top-bar .status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #1a1a1a;
    }
    #top-bar .status.ok { color: #9ece6a; background: #1a2618; }
    #top-bar .status.warn { color: #e0af68; background: #2a2210; }
    #top-bar .status.err { color: #f7768e; background: #2a1218; }
    #top-bar .title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #top-bar .spacer { flex: 1; }
    .btn {
      font-family: inherit;
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
    }
    .btn:hover { background: #252525; }
    .btn.active { border-color: var(--accent); color: var(--accent); }

    /* ── map ── */
    #map-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #map { width: 100%; height: 100%; }

    /* ── settings drawer (bottom sheet) ── */
    #drawer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: max-height 0.25s ease;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #drawer.collapsed { max-height: 36px; overflow: hidden; }
    #drawer-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      cursor: pointer;
      color: var(--dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    #drawer-handle::before {
      content: '';
      display: block;
      width: 30px; height: 3px;
      border-radius: 2px;
      background: #333;
      margin-right: 8px;
    }

    #drawer-body {
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 500px) {
      #drawer-body {
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
      }
    }

    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-section h3 {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--dim); margin-bottom: 2px;
    }
    .ctrl-section label {
      font-size: 11px; color: #888;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ctrl-section label span { color: #bbb; font-weight: 600; font-size: 11px; }
    .ctrl-section input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: #333; border-radius: 2px; outline: none;
    }
    .ctrl-section input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .ctrl-section input[type="number"], .ctrl-section select {
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      padding: 4px 6px; border-radius: 4px; font-size: 11px;
      font-family: inherit; width: 100%;
    }

    /* ── preview overlay (near-fullscreen modal) ── */
    #preview-overlay {
      position: fixed;
      top: 0; bottom: 0; left: 0; right: 0;
      background: rgba(5,5,5,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 2000;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px) 0;
    }
    #preview-overlay.visible { display: flex; }

    /* close hint bar */
    #preview-close-hint {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--dim);
      border-bottom: 1px solid var(--border);
    }
    #preview-close-hint .close-x {
      font-size: 18px;
      color: #ccc;
      cursor: pointer;
      padding: 0 8px;
      line-height: 1;
    }

    .preview-panes-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    @media (min-width: 700px) and (orientation: landscape) {
      .preview-panes-wrap { flex-direction: row; }
    }

    .preview-pane {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      min-height: 0;
    }
    .preview-pane + .preview-pane {
      border-top: 1px solid var(--border);
    }
    @media (min-width: 700px) and (orientation: landscape) {
      .preview-pane + .preview-pane {
        border-top: none;
        border-left: 1px solid var(--border);
      }
    }
    .preview-pane-header {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--dim);
      flex-shrink: 0;
    }
    .preview-pane img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 4px;
      flex: 1;
      min-height: 0;
    }
    .preview-pane .text-body {
      font-size: 16px; line-height: 1.6; color: #eee;
      white-space: pre-wrap; word-break: break-word;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      min-height: 0;
    }
    .preview-meta {
      font-size: 11px; color: #666;
      flex-shrink: 0;
    }
    .preview-pane .empty { color: #333; font-size: 12px; }

    /* ── leaflet overrides ── */
    .leaflet-control-attribution { font-size: 8px !important; }
    .point-marker { border: none; background: none; }
  </style>
</head>

<body>
  <div id="app">
    <!-- top status bar -->
    <div id="top-bar">
      <span class="title">Geo Explorer</span>
      <span class="spacer"></span>
      <span class="status" id="gps-status">GPS off</span>
      <span class="status" id="data-status">No data</span>
      <span class="status" id="nearest-status">--</span>
      <span class="status" id="tilt-status">tilt off</span>
      <button class="btn" id="btn-gps">Start GPS</button>
      <button class="btn" id="btn-tilt">Start Tilt</button>
      <button class="btn active" id="btn-sound">Sound: on</button>
      <button class="btn" id="btn-center">Set center here</button>
      <button class="btn" id="btn-drawer-toggle">Settings</button>
    </div>

    <!-- map -->
    <div id="map-container">
      <div id="map"></div>
      <!-- preview overlay sits on top of map -->
      <div id="preview-overlay">
        <div id="preview-close-hint">
          <span>Tap × to close</span>
          <span class="close-x" onclick="document.getElementById('preview-overlay').classList.remove('visible')">×</span>
        </div>
        <div class="preview-panes-wrap">
          <div class="preview-pane" id="img-pane">
            <div class="preview-pane-header">Image</div>
            <div class="empty" id="img-empty">No image in range</div>
            <img id="preview-img" style="display:none;" />
            <div class="preview-meta" id="img-meta"></div>
          </div>
          <div class="preview-pane" id="txt-pane">
            <div class="preview-pane-header">Text</div>
            <div class="empty" id="txt-empty">No text in range</div>
            <div class="text-body" id="preview-text" style="display:none;"></div>
            <div class="preview-meta" id="txt-meta"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- settings drawer -->
    <div id="drawer" class="collapsed">
      <div id="drawer-handle">Settings</div>
      <div id="drawer-body">

        <div class="ctrl-section">
          <h3>Map Center</h3>
          <label>Latitude <span id="center-lat-val">52.3676</span></label>
          <input type="number" id="center-lat" step="0.0001" value="52.3676" />
          <label>Longitude <span id="center-lng-val">4.9041</span></label>
          <input type="number" id="center-lng" step="0.0001" value="4.9041" />
        </div>

        <div class="ctrl-section">
          <h3>Mapping</h3>
          <label>Radius (m) <span id="radius-val">200</span></label>
          <input type="range" id="radius" min="10" max="2000" step="10" value="200" />
          <label>Plane</label>
          <select id="plane-select">
            <option value="XY">X &rarr; Lng, Y &rarr; Lat</option>
            <option value="XZ">X &rarr; Lng, Z &rarr; Lat</option>
            <option value="YZ">Y &rarr; Lng, Z &rarr; Lat</option>
          </select>
        </div>

        <div class="ctrl-section">
          <h3>Depth (3rd axis)</h3>
          <label>Depth range <span id="depth-range-val">1.00</span></label>
          <input type="range" id="depth-range" min="0.05" max="3.0" step="0.05" value="1.0" />
          <label>Depth center <span id="depth-center-val">0.00</span></label>
          <input type="range" id="depth-center" min="-3.0" max="3.0" step="0.05" value="0.0" />
        </div>

        <div class="ctrl-section">
          <h3>Cursor</h3>
          <label>Range <span id="cursor-range-val">0.50</span></label>
          <input type="range" id="cursor-range" min="0.01" max="3.0" step="0.01" value="0.50" />
          <label>Data file</label>
          <input type="file" id="load-json" accept=".json" style="font-size:10px;" />
        </div>

      </div>
    </div>
  </div>

  <script src="geo.js"></script>
</body>
</html>
